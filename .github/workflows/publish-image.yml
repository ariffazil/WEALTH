name: WEALTH CI — Build Validation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wealth-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Build-only validation. GHCR push is handled autonomously by VPS deploy-vps.sh
      # because GITHUB_TOKEN cannot push to GHCR packages created via PAT (403 Forbidden).
      # The VPS pulls latest code, builds locally, pushes with gh CLI token, and restarts.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            ghcr.io/ariffazil/wealth:${{ steps.vars.outputs.short_sha }}
            ghcr.io/ariffazil/wealth:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
